<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DinoDex — Catálogo interativo de dinossauros</title>
<meta name="description" content="Explore 20 espécies de dinossauros com fichas ilustradas, mapas de descoberta, linha do tempo, comparações de tamanho e curiosidades. Busque, filtre por período ou grupo e monte sua coleção de favoritos.">
<meta name="theme-color" content="#12141c">
<link rel="canonical" href="https://gabbydino.github.io/dinodex/">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="DinoDex — Catálogo interativo de dinossauros">
<meta property="og:description" content="Explore 20 espécies de dinossauros com fichas ilustradas, mapas, linha do tempo e curiosidades.">
<meta property="og:url" content="https://gabbydino.github.io/dinodex/">
<meta property="og:locale" content="pt_BR">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="strata-bg" aria-hidden="true"></div>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M8 58 L14 40 Q10 30 22 26 L34 8 Q40 2 48 6 L58 14 Q66 12 70 18 L64 22 Q72 24 74 30 L66 30 Q70 36 66 40 L58 38 Q54 46 44 46 L40 58 L34 58 L36 46 Q28 46 24 42 L20 58 Z"/></svg>
      </span>
      DinoDex
    </a>
    <div class="header-stats">
      <span id="dexProgress" class="stat-pill">Descobertos: 0/20</span>
      <span id="achProgress" class="stat-pill">🏆 0/5</span>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <p class="hero-eyebrow">Catálogo de campo · 20 espécies</p>
    <h1>Uma enciclopédia viva da <em>Era dos Dinossauros</em></h1>
    <p class="hero-sub" id="dailyFact">Carregando curiosidade do dia…</p>
  </section>

  <section class="controls-bar" aria-label="Busca e filtros">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="search" type="search" placeholder="Buscar por nome…" aria-label="Buscar dinossauro por nome">
    </div>
    <div class="filters" id="filters"></div>
  </section>

  <section aria-label="Lista de dinossauros">
    <div class="dino-grid" id="dinoGrid">
      <div class="grid-empty">Carregando dinossauros…</div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <span>DinoDex v2.0 — feito para Gabby</span>
  <span>Fontes: museus de história natural, artigos revisados por pares e Paleobiology Database (PBDB)</span>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
