<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINODEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --shell:#6B4FA0;
    --shell-light:#8A6FC0;
    --shell-dark:#4A3573;
    --shell-darkest:#332450;
    --bezel:#1c1c1c;
    --lcd-0:#0F380F;
    --lcd-1:#306230;
    --lcd-2:#8BAC0F;
    --lcd-3:#9BBC0F;
    --btn-red:#D6483C;
    --btn-red-dark:#9C2F26;
    --cream:#E8E4D0;
    --px:'Press Start 2P', monospace;
    --lcd-font:'VT323', monospace;
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 50% 0%, #2b2350 0%, #16112b 60%, #0d0a1c 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;
    font-family:var(--lcd-font);
    color:var(--cream);
  }
  .stars{position:fixed;inset:0;pointer-events:none;opacity:.5;
    background-image:
      radial-gradient(1px 1px at 20px 30px, #fff, transparent),
      radial-gradient(1px 1px at 140px 90px, #fff, transparent),
      radial-gradient(1px 1px at 300px 60px, #fff, transparent),
      radial-gradient(1px 1px at 400px 200px, #fff, transparent),
      radial-gradient(1px 1px at 500px 40px, #fff, transparent),
      radial-gradient(1px 1px at 600px 150px, #fff, transparent),
      radial-gradient(1px 1px at 80px 220px, #fff, transparent),
      radial-gradient(1px 1px at 250px 260px, #fff, transparent);
    background-repeat:repeat;
    background-size:640px 320px;
  }

  /* ===== DEVICE SHELL ===== */
  .dex{
    position:relative;
    width:min(920px, 96vw);
    background:linear-gradient(160deg, var(--shell-light), var(--shell) 45%, var(--shell-dark) 100%);
    border-radius:28px;
    padding:22px 26px 28px;
    box-shadow:
      0 0 0 4px var(--shell-darkest),
      0 20px 0 0 rgba(0,0,0,.35),
      0 30px 60px rgba(0,0,0,.55),
      inset 0 2px 0 rgba(255,255,255,.25);
  }
  .dex-top{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .lens{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #cfe8ff, #4a8fd6 45%, #1c3f66 100%);box-shadow:0 0 0 4px var(--shell-darkest), inset 0 0 6px rgba(0,0,0,.5);}
  .lights{display:flex;gap:8px;margin-left:auto;}
  .light{width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 2px var(--shell-darkest);}
  .light.red{background:#ff5b52;box-shadow:0 0 0 2px var(--shell-darkest), 0 0 6px #ff5b52;}
  .light.yellow{background:#ffd84d;}
  .light.green{background:#7CFC6E;}
  .brand{
    font-family:var(--px);
    font-size:clamp(18px,3vw,28px);
    letter-spacing:2px;
    margin:4px 0 2px 4px;
    color:var(--cream);
    text-shadow:2px 2px 0 var(--shell-darkest);
  }
  .dex-progress{
    font-family:var(--px);
    font-size:8px;
    color:var(--cream);
    opacity:.75;
    margin:0 0 14px 5px;
    letter-spacing:1px;
  }

  .panels-wrap{position:relative;}
  .panels{display:grid;grid-template-columns:1fr 1.35fr;gap:18px;}
  @media (max-width:720px){ .panels{grid-template-columns:1fr;} }

  /* ===== BOOT SCREEN ===== */
  .boot-screen{
    position:absolute;inset:0;
    background:var(--lcd-3);
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    z-index:30;
    padding:20px;
    box-shadow:inset 0 0 18px rgba(0,0,0,.35);
    transition:opacity .5s ease;
  }
  .boot-screen.hidden{opacity:0;pointer-events:none;}
  .boot-lines{font-family:var(--lcd-font);color:var(--lcd-0);text-align:left;width:100%;max-width:320px;}
  .boot-title{font-family:var(--px);font-size:13px;margin-bottom:16px;text-align:center;letter-spacing:1px;}
  .boot-row{margin:8px 0;font-size:19px;}
  .boot-row .boot-label{margin-bottom:2px;}
  .boot-bar{letter-spacing:1px;font-size:18px;}
  .boot-ready{font-family:var(--px);font-size:12px;margin-top:16px;text-align:center;animation:flicker .5s steps(2) infinite;}

  /* ===== SCAN (ao selecionar um dino) ===== */
  .scan-box{margin:auto;text-align:center;}
  .scan-title{font-family:var(--px);font-size:12px;margin-bottom:12px;animation:flicker .4s steps(2) infinite;}
  .scan-bar{font-size:20px;letter-spacing:1px;}
  .scan-id{font-family:var(--px);font-size:11px;margin-bottom:10px;color:var(--lcd-1);}
  .scan-num{font-family:var(--px);font-size:10px;margin-bottom:6px;}
  .scan-name{font-family:var(--px);font-size:14px;}

  /* ===== FATO DO DIA (tela inicial) ===== */
  .boot-wrap{margin:auto;text-align:center;display:flex;flex-direction:column;gap:16px;align-items:center;padding:0 8px;}
  .daily-fact{max-width:260px;}
  .daily-fact-title{font-family:var(--px);font-size:9px;margin-bottom:6px;}
  .daily-fact-text{font-size:18px;line-height:1.35;}

  /* ===== PROGRESSO / CONQUISTAS ===== */
  .dex-progress-row{display:flex;gap:14px;margin:0 0 14px 5px;}
  .dex-progress{font-family:var(--px);font-size:8px;color:var(--cream);opacity:.75;letter-spacing:1px;}
  .achievement-toast{
    position:fixed;top:16px;left:50%;transform:translate(-50%,-20px);
    background:var(--lcd-0);color:var(--lcd-3);font-family:var(--px);font-size:9px;
    padding:10px 14px;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.5);
    opacity:0;transition:all .3s ease;z-index:100;text-align:center;max-width:80vw;
    pointer-events:none;
  }
  .achievement-toast.show{opacity:1;transform:translate(-50%,0);}
  .reg-toast{font-size:13px;line-height:1.5;}

  /* ===== PAINEL DE REGISTRO (estilo Pokédex) ===== */
  .reg-panel{background:var(--lcd-2);color:var(--lcd-0);border:2px solid var(--lcd-0);border-radius:4px;padding:6px 8px;margin-bottom:8px;font-family:var(--lcd-font);flex:none;}
  .reg-row{display:flex;justify-content:space-between;align-items:center;font-family:var(--px);font-size:8px;}
  .reg-bar{font-size:14px;letter-spacing:1px;margin:3px 0;}
  .reg-checklist{display:flex;flex-wrap:wrap;gap:2px 10px;font-size:13px;margin-top:2px;}
  .reg-item{opacity:.5;white-space:nowrap;}
  .reg-item.done{opacity:1;font-weight:bold;}

  /* ===== "SE VOCÊ ENCONTRASSE UM..." ===== */
  .encounter-box{margin-top:10px;border-top:2px dashed var(--lcd-0);padding-top:8px;}
  .encounter-title{font-family:var(--px);font-size:8px;margin-bottom:6px;}
  .encounter-row{display:flex;justify-content:space-between;gap:10px;margin:4px 0;font-size:18px;}
  .encounter-row .stars{font-family:var(--lcd-font);letter-spacing:2px;white-space:nowrap;}
  .encounter-disclaimer{margin-top:8px;font-size:13px;font-style:italic;opacity:.75;}

  .screen-bezel{background:var(--bezel);border-radius:14px;padding:10px;box-shadow:inset 0 0 0 3px #000, 0 4px 0 rgba(0,0,0,.4);}
  .screen{
    background:var(--lcd-3);
    border-radius:6px;
    position:relative;
    overflow:hidden;
    box-shadow:inset 0 0 18px rgba(0,0,0,.35);
    color:var(--lcd-0);
  }

  /* ===== LEFT: LIST SCREEN ===== */
  .list-screen{padding:12px;height:440px;display:flex;flex-direction:column;gap:8px;}
  .search-row input{
    width:100%;
    font-family:var(--lcd-font);
    font-size:20px;
    background:var(--lcd-2);
    border:2px solid var(--lcd-0);
    border-radius:4px;
    padding:6px 8px;
    color:var(--lcd-0);
    outline:none;
  }
  .search-row input::placeholder{color:var(--lcd-1);}
  .search-row input:focus{background:var(--lcd-3);box-shadow:0 0 0 3px var(--lcd-1);}

  .filters{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    font-family:var(--px);
    font-size:8px;
    line-height:1.4;
    padding:5px 7px;
    border:2px solid var(--lcd-0);
    border-radius:3px;
    background:var(--lcd-2);
    color:var(--lcd-0);
    cursor:pointer;
    user-select:none;
  }
  .chip:hover{background:var(--lcd-3);}
  .chip.active{background:var(--lcd-0);color:var(--lcd-3);}
  .chip:focus-visible, .list-item:focus-visible, button:focus-visible, input:focus-visible{
    outline:3px solid #ffd84d; outline-offset:2px;
  }

  .dino-list{list-style:none;margin:0;padding:0;overflow-y:auto;flex:1;border-top:2px dashed var(--lcd-0);padding-top:6px;}
  .dino-list::-webkit-scrollbar{width:10px;}
  .dino-list::-webkit-scrollbar-thumb{background:var(--lcd-0);border-radius:6px;}
  .dino-list::-webkit-scrollbar-track{background:var(--lcd-2);}

  .list-item{
    display:flex;align-items:center;gap:8px;
    padding:6px 6px;
    cursor:pointer;
    border-bottom:1px solid var(--lcd-2);
    font-size:20px;
  }
  .list-item:hover{background:var(--lcd-2);}
  .list-item.selected{background:var(--lcd-0);color:var(--lcd-3);}
  .list-num{font-family:var(--px);font-size:9px;min-width:34px;}
  .list-icon{width:26px;height:26px;flex:none;}
  .list-item.undiscovered .list-icon svg{filter:brightness(0);opacity:.5;}
  .list-item.undiscovered .list-name{opacity:.65;letter-spacing:2px;}
  .list-empty{padding:14px;font-size:18px;text-align:center;opacity:.75;}

  .special-row{display:flex;gap:6px;margin-top:2px;}
  .special-row .chip{flex:1;text-align:center;}

  /* ===== RIGHT: DETAIL SCREEN ===== */
  .detail-screen{height:440px;padding:16px;display:flex;flex-direction:column;}
  .scanlines{
    position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(15,56,15,.12) 0px, rgba(15,56,15,.12) 1px, transparent 2px, transparent 4px);
    mix-blend-mode:multiply;
  }
  .boot-msg{
    text-align:center;font-family:var(--px);font-size:11px;line-height:2;
    animation:flicker 1.6s steps(2) infinite;
  }
  @keyframes flicker{ 0%,100%{opacity:1;} 50%{opacity:.55;} }

  .static-noise{
    position:absolute;inset:0;
    background-image:repeating-linear-gradient(0deg, var(--lcd-0) 0 2px, var(--lcd-2) 2px 4px);
    opacity:0; pointer-events:none;
  }
  .static-noise.on{opacity:.9; animation:noise .12s steps(2) infinite;}
  @keyframes noise{ 0%{transform:translateY(0);} 100%{transform:translateY(4px);} }

  .scroll-hint{
    position:absolute;left:0;right:0;bottom:0;
    padding:16px 0 6px;
    text-align:center;
    font-family:var(--px);
    font-size:8px;
    letter-spacing:1px;
    color:var(--lcd-0);
    background:linear-gradient(to bottom, rgba(155,188,15,0), var(--lcd-3) 60%);
    pointer-events:none;
    opacity:0;
    transition:opacity .25s ease;
  }
  .scroll-hint.show{opacity:1; animation:bounce-hint 1.3s ease-in-out infinite;}
  @keyframes bounce-hint{0%,100%{transform:translateY(0);} 50%{transform:translateY(4px);}}

  .d-header{display:flex;justify-content:space-between;align-items:center;font-family:var(--px);font-size:10px;margin-bottom:6px;}
  .fav-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--lcd-0);line-height:1;padding:0 2px;}
  .fav-btn:hover{transform:scale(1.15);}
  .d-name{font-family:var(--px);font-size:clamp(13px,2.2vw,17px);margin:2px 0 2px;}
  .d-latin{font-style:italic;font-size:16px;opacity:.85;margin-bottom:6px;}

  .d-body{display:flex;gap:14px;flex:1;min-height:0;}
  .d-art{width:150px;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;}
  .d-art-icon{width:100%;}
  .d-art-icon svg{width:100%;height:auto;}
  .d-art-caption{font-size:11px;text-align:center;opacity:.7;line-height:1.2;}

  /* ===== seções enciclopédicas da ficha ===== */
  .section{margin-top:10px;border-top:2px dashed var(--lcd-0);padding-top:8px;}
  .section-title{font-family:var(--px);font-size:8px;margin-bottom:6px;}
  .section-caption{font-size:15px;margin-top:4px;opacity:.85;text-align:center;}

  .map-svg{width:100%;max-width:260px;display:block;margin:0 auto;}
  .map-ocean{fill:var(--lcd-0);}
  .map-land{fill:var(--lcd-2);stroke:var(--lcd-1);stroke-width:1;}
  .map-pin{fill:var(--lcd-0);}
  .map-pin-pulse{fill:none;stroke:var(--lcd-0);stroke-width:2;transform-origin:center;transform-box:fill-box;animation:pulse-ring 1.6s ease-out infinite;}
  @keyframes pulse-ring{0%{transform:scale(1);opacity:1;} 100%{transform:scale(3.2);opacity:0;}}

  .tl-track{display:flex;height:22px;border:2px solid var(--lcd-0);position:relative;}
  .tl-seg{display:flex;align-items:center;justify-content:center;border-right:1px solid var(--lcd-0);color:var(--lcd-0);background:var(--lcd-2);overflow:hidden;white-space:nowrap;font-family:var(--px);font-size:6px;text-align:center;}
  .tl-seg:last-child{border-right:none;}
  .tl-marker{position:absolute;top:-4px;height:30px;background:var(--lcd-0);opacity:.85;border:2px solid var(--cream);box-sizing:border-box;}
  .tl-scale{display:flex;justify-content:space-between;font-size:11px;margin-top:4px;opacity:.8;}

  .discovery-box > div{margin:3px 0;font-size:16px;}

  .tax-list{list-style:none;padding:0;margin:0;font-size:16px;}
  .tax-list li{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dotted var(--lcd-1);padding:2px 0;}
  .tax-list li span:first-child{opacity:.7;flex:none;}
  .tax-list li span:last-child{text-align:right;}

  .compare-wrap{display:flex;gap:28px;align-items:flex-end;justify-content:center;margin-top:6px;padding-bottom:2px;}
  .compare-col{display:flex;flex-direction:column-reverse;align-items:center;gap:6px;}
  .compare-bar{width:26px;background:var(--lcd-0);border:2px solid var(--lcd-1);}
  .compare-bar.human{background:var(--lcd-1);}
  .compare-label{font-size:13px;text-align:center;line-height:1.25;}

  .sources-box ul{margin:4px 0 0;padding-left:16px;font-size:14px;line-height:1.4;}

  .d-info{flex:1;overflow-y:auto;font-size:19px;line-height:1.35;padding-right:4px;}
  .d-info::-webkit-scrollbar{width:8px;}
  .d-info::-webkit-scrollbar-thumb{background:var(--lcd-0);border-radius:6px;}

  .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .tag{font-family:var(--px);font-size:8px;background:var(--lcd-0);color:var(--lcd-3);padding:4px 6px;border-radius:3px;}

  .stat{display:flex;align-items:center;gap:8px;margin:5px 0;}
  .stat-label{font-family:var(--px);font-size:8px;width:80px;flex:none;}
  .stat-bar{display:flex;gap:2px;}
  .stat-cell{width:9px;height:12px;background:var(--lcd-2);border:1px solid var(--lcd-0);}
  .stat-cell.filled{background:var(--lcd-0);}

  .desc{margin-top:8px;}
  .fact{margin-top:6px;font-style:italic;opacity:.9;}

  .placeholder-icon{opacity:.35;}

  /* ===== POWER ROW ===== */
  .power-row{display:flex;align-items:center;gap:8px;margin-top:8px;justify-content:flex-end;padding-right:4px;}
  .power-label{font-family:var(--px);font-size:8px;color:var(--cream);}
  .power-switch{position:relative;display:inline-block;width:42px;height:20px;}
  .power-switch input{opacity:0;width:0;height:0;}
  .switch-track{position:absolute;inset:0;background:var(--shell-darkest);border-radius:10px;cursor:pointer;box-shadow:inset 0 0 0 2px #000;}
  .switch-track::before{content:"";position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--btn-red);border-radius:50%;transition:transform .15s;box-shadow:0 0 4px rgba(0,0,0,.6);}
  .power-switch input:checked + .switch-track::before{transform:translateX(20px);background:#7CFC6E;}

  .dex.off .screen{background:#0a0a0a;}
  .dex.off .screen *{visibility:hidden;}
  .dex.off .screen::after{
    content:"●";
    visibility:visible;
    position:absolute;top:8px;right:10px;color:#5a1010;font-size:10px;
  }

  /* ===== CONTROLS ===== */
  .controls{display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding:0 6px;}
  .dpad{position:relative;width:78px;height:78px;}
  .dpad button{
    position:absolute;background:var(--shell-darkest);border:none;color:var(--cream);
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.4), 0 2px 0 rgba(0,0,0,.3);
    cursor:pointer;font-size:12px;line-height:0;
  }
  .dpad button:active{filter:brightness(1.3);}
  .dpad .up{left:26px;top:0;width:26px;height:26px;border-radius:4px 4px 0 0;}
  .dpad .down{left:26px;top:52px;width:26px;height:26px;border-radius:0 0 4px 4px;}
  .dpad .left{left:0;top:26px;width:26px;height:26px;border-radius:4px 0 0 4px;}
  .dpad .right{left:52px;top:26px;width:26px;height:26px;border-radius:0 4px 4px 0;}
  .dpad .center{left:26px;top:26px;width:26px;height:26px;background:#1a1330;}

  .abbtns{display:flex;gap:14px;align-items:center;}
  .abbtns button{
    width:44px;height:44px;border-radius:50%;
    background:linear-gradient(160deg, var(--btn-red), var(--btn-red-dark));
    border:none;color:#3a0a06;font-family:var(--px);font-size:12px;
    box-shadow:0 4px 0 var(--btn-red-dark), inset 0 2px 0 rgba(255,255,255,.3);
    cursor:pointer;
  }
  .abbtns button:active{box-shadow:0 1px 0 var(--btn-red-dark);transform:translateY(3px);}
  .abbtns .hint{font-family:var(--px);font-size:7px;text-align:center;margin-top:4px;color:var(--cream);opacity:.8;}

  .speaker{
    display:flex;gap:5px;
    filter:opacity(.5);
  }
  .speaker span{width:5px;height:24px;background:var(--shell-darkest);border-radius:3px;}
  .speaker-wrap{display:flex;gap:5px;transform:rotate(20deg);}

  .credit{text-align:center;font-family:var(--px);font-size:7px;color:var(--cream);opacity:.5;margin-top:18px;letter-spacing:1px;}
</style>
</head>
<body>
<div class="stars"></div>

<div class="dex" id="dex">
  <div class="dex-top">
    <div class="lens"><div></div></div>
    <div class="lights"><span class="light red"></span><span class="light yellow"></span><span class="light green"></span></div>
  </div>
  <h1 class="brand">DINODEX</h1>
  <div class="dex-progress-row">
    <div class="dex-progress" id="dexProgress">DESCOBERTOS: 0/20</div>
    <div class="dex-progress" id="achProgress">🏆 0/5</div>
  </div>

  <div class="panels-wrap">
  <div class="boot-screen" id="bootScreen">
    <div class="boot-lines" id="bootLines"></div>
  </div>
  <div class="panels">
    <!-- LEFT PANEL: LIST -->
    <div class="panel left">
      <div class="screen-bezel">
        <div class="screen list-screen">
          <div class="search-row">
            <input id="search" type="text" placeholder="BUSCAR DINOSSAURO..." aria-label="Buscar dinossauro">
          </div>
          <div class="filters" id="filters"></div>
          <ul class="dino-list" id="dinoList" aria-label="Lista de dinossauros"></ul>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: DETAIL -->
    <div class="panel right">
      <div class="screen-bezel">
        <div class="screen detail-screen" id="detailScreen">
          <div class="scanlines"></div>
          <div class="static-noise" id="staticNoise"></div>
          <div id="detailContent"></div>
          <div class="scroll-hint" id="scrollHint">▼ ROLE PRA LER MAIS ▼</div>
        </div>
      </div>
      <div class="power-row">
        <span class="power-label">POWER</span>
        <label class="power-switch">
          <input type="checkbox" id="powerToggle" checked>
          <span class="switch-track"></span>
        </label>
      </div>
    </div>
  </div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="up" id="dpadUp" aria-label="Anterior">▲</button>
      <button class="down" id="dpadDown" aria-label="Próximo">▼</button>
      <button class="left" aria-label="Esquerda">◀</button>
      <button class="right" aria-label="Direita">▶</button>
      <div class="center"></div>
    </div>
    <div class="speaker-wrap">

}
function saveSet(key, set){
  try{ localStorage.setItem(key, JSON.stringify([...set])); }
  catch(e){ /* localStorage indisponível — segue sem salvar */ }
}

  {id:'carnivores', label:'Todos os carnívoros descobertos', test: () => DINOS.filter(d=>d.dieta==='Carnívoro').every(d=>discovered.has(d.id))},

function dinoDoDia(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 86400000);
  return DINOS[dayOfYear % DINOS.length];
}

function buildFilters(){
  filtersEl.innerHTML = "";

  ERAS.forEach(era=>{

    b.className = 'chip' + (era===activeEra ? ' active' : '');
    b.textContent = era;
    b.addEventListener('click', ()=>{ tick(); activeEra = era; buildFilters(); renderList(); });
    eraWrap.appendChild(b);
  });
  filtersEl.appendChild(eraWrap);

  const dietWrap = document.createElement('div');
  dietWrap.style.display='flex'; dietWrap.style.flexWrap='wrap'; dietWrap.style.gap='6px'; dietWrap.style.marginTop='4px';
  DIETS.forEach(diet=>{

    b.addEventListener('click', ()=>{ tick(); activeDiet = diet; buildFilters(); renderList(); });

  });
  filtersEl.appendChild(dietWrap);

  const specialRow = document.createElement('div');
  specialRow.className = 'special-row';

  const favBtn = document.createElement('button');
  favBtn.className = 'chip' + (favOnly ? ' active' : '');

  specialRow.appendChild(favBtn);

  const dayBtn = document.createElement('button');

  dayBtn.textContent = '★ DINO DO DIA';
  dayBtn.addEventListener('click', ()=>{ tick(); selectDino(dinoDoDia().id); });

  filtersEl.appendChild(specialRow);
}

function filteredDinos(){
  return getAllDinos().filter(d=>{
    const matchesSearch = d.nome.toLowerCase().includes(searchTerm.toLowerCase()) ||
                           d.latim.toLowerCase().includes(searchTerm.toLowerCase());
    const matchesEra = activeEra==="Todas" || d.era===activeEra;
    const matchesDiet = activeDiet==="Todas" || d.dieta===activeDiet;
    const matchesFav = !favOnly || favorites.has(d.id);
    return matchesSearch && matchesEra && matchesDiet && matchesFav;
  });
}

function renderList(){
  const dinos = filteredDinos();
  listEl.innerHTML = "";
  if(dinos.length===0){
    const li = document.createElement('li');
    li.className = 'list-empty';
    li.textContent = 'NENHUM DINOSSAURO ENCONTRADO';
    listEl.appendChild(li);
    return;
  }
  dinos.forEach(d=>{
    const isDiscovered = discovered.has(d.id);
    const li = document.createElement('li');
    li.className = 'list-item'
      + (d.id===selectedId ? ' selected' : '')
      + (isDiscovered ? '' : ' undiscovered');
    li.tabIndex = 0;
    li.setAttribute('role','button');
    const heart = favorites.has(d.id) ? '❤ ' : '';
    const displayName = isDiscovered ? (heart + d.nome) : '???';
    li.innerHTML = `<span class="list-num">Nº${String(d.id).padStart(3,'0')}</span>
      <span class="list-icon">${ICONS[d.forma] || ICONS.theropod}</span>
      <span class="list-name">${displayName}</span>`;

    li.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); selectDino(d.id);} });

  });
}

function timelineHTML(d){
  const total = 252 - 66;
  const segments = [
    {name:'Triássico', start:252, end:201},
    {name:'Jurássico', start:201, end:145},
    {name:'Cretáceo', start:145, end:66},
  ];
  const segHtml = segments.map(s=>{
    const w = (s.start - s.end) / total * 100;
    return `<div class="tl-seg" style="width:${w}%">${s.name.toUpperCase()}</div>`;
  }).join('');
  const left = (252 - d.periodo.inicio) / total * 100;
  const width = Math.max(1.5, (d.periodo.inicio - d.periodo.fim) / total * 100);
  return `
    <div class="timeline">
      <div class="tl-track">${segHtml}<div class="tl-marker" style="left:${left}%;width:${width}%"></div></div>

}

/* ===== registro de leitura (estilo "visto/registrado" da Pokédex) ===== */
const TRACK_KEYS = ['alimentacao','peso','local','curiosidades','formacao','fossil'];
const TRACK_LABELS = {
  alimentacao:'Alimentação', peso:'Peso', local:'Local',
  curiosidades:'Curiosidades', formacao:'Formação', fossil:'Fóssil',
};
function loadRegistro(){
  try{ return JSON.parse(localStorage.getItem('dinodex_registro') || "{}"); }
  catch(e){ return {}; }
}
function saveRegistro(){
  try{ localStorage.setItem('dinodex_registro', JSON.stringify(registro)); }
  catch(e){ /* localStorage indisponível — segue sem salvar */ }
}
let registro = loadRegistro();
let trackObserver = null;

function regPanelInner(d){
  const done = new Set(registro[d.id] || []);
  const percent = Math.round((done.size / TRACK_KEYS.length) * 100);
  const filled = Math.round((done.size / TRACK_KEYS.length) * 10);
  const checklist = TRACK_KEYS.map(k =>
    `<span class="reg-item${done.has(k) ? ' done' : ''}">${done.has(k) ? '✓' : '○'} ${TRACK_LABELS[k]}</span>`
  ).join('');
  return `
    <div class="reg-row"><span>Nº${String(d.id).padStart(3,'0')}</span><span>${percent===100 ? 'REGISTRADO' : 'REGISTRANDO...'}</span></div>
    <div class="reg-bar">${makeBar(filled)} ${percent}%</div>
    <div class="reg-checklist">${checklist}</div>
  `;
}

  const el = document.getElementById('regPanel');

}

  }, 2600);
}

function setupTracking(d){
  if(trackObserver) trackObserver.disconnect();
  const root = detailEl.querySelector('.d-info');
  if(!root) return;
  trackObserver = new IntersectionObserver((entries)=>{
    const list = registro[d.id] || (registro[d.id] = []);
    const before = list.length;
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const key = entry.target.getAttribute('data-track');
        if(key && !list.includes(key)) list.push(key);
      }
    });
    if(list.length !== before){
      saveRegistro();
      updateRegPanel(d);
      if(before < TRACK_KEYS.length && list.length === TRACK_KEYS.length){
        showRegistroCompleto();
      }
    }
  }, {threshold:0.6});
  detailEl.querySelectorAll('[data-track]').forEach(el => trackObserver.observe(el));

  updateScrollHint();
  root.addEventListener('scroll', updateScrollHint);
}

function updateScrollHint(){
  const root = detailEl.querySelector('.d-info');
  const hint = document.getElementById('scrollHint');
  if(!root || !hint) return;
  const hasMore = root.scrollHeight - root.scrollTop - root.clientHeight > 12;
  hint.classList.toggle('show', hasMore);
}

async function selectDino(id){
  selectedId = id;
  const d = getAllDinos().find(x=>x.id===id);
  if(!d) return;
  const isNew = !discovered.has(id);
  discovered.add(id);
  if(isNew) saveSet('dinodex_discovered', discovered);
  renderList();
  updateProgress();
  checkAchievements();
  await scanAnimation(d);
}

/* ===== boot sequence ===== */
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

function makeBar(filled){
  return '█'.repeat(filled) + '░'.repeat(10 - filled);
}

function beep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = 880;
    gain.gain.value = 0.04;
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.12);
  }catch(e){ /* áudio bloqueado pelo navegador — segue sem som */ }
}

function tick(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = 520;
    gain.gain.value = 0.025;
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.035);
  }catch(e){ /* áudio bloqueado pelo navegador */ }
}

function chirp(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(660, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.08);
    gain.gain.value = 0.04;
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  }catch(e){ /* áudio bloqueado pelo navegador */ }
}

async function bootSequence(){
  const bootLines = document.getElementById('bootLines');
  bootLines.innerHTML = '<div class="boot-title">DINODEX v1.0</div>';
  await sleep(250);

  const stages = ["Inicializando...", "Carregando banco de fósseis...", "Sincronizando dados..."];
  for(const stage of stages){
    const row = document.createElement('div');
    row.className = 'boot-row';
    row.innerHTML = `<div class="boot-label">${stage}</div><div class="boot-bar">${makeBar(0)}</div>`;
    bootLines.appendChild(row);
    const barEl = row.querySelector('.boot-bar');
    for(let i=1;i<=10;i++){
      barEl.textContent = makeBar(i);
      await sleep(45);
    }
    await sleep(90);
  }

  const ready = document.createElement('div');
  ready.className = 'boot-ready';
  ready.textContent = 'Pronto!';
  bootLines.appendChild(ready);
  beep();
  await sleep(500);
  document.getElementById('bootScreen').classList.add('hidden');
}

/* ===== inicialização ===== */
async function init(){
  buildFilters();
  updateProgress();
  updateAchievementsCount();
  const boot = bootSequence();
  await loadDinos();
  await boot;
  renderList();
  bootMessage();
}
init();
</script>
